version: "3.8"
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://tripplanner:tripplanner@postgres:5432/tripplanner
      - JWT_SECRET=your-super-secret-jwt-key-change-this
    depends_on:
      - postgres
    volumes:
      - ./backend/uploads:/app/uploads

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=tripplanner
      - POSTGRES_USER=tripplanner
      - POSTGRES_PASSWORD=tripplanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
