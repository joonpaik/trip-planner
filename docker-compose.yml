version: "3.8"
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://familyuser:familypass@mysql:3306/familysocial
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=your-super-secret-jwt-key-change-this
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend/uploads:/app/uploads

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=familysocial
      - MYSQL_USER=familyuser
      - MYSQL_PASSWORD=familypass
      - MYSQL_ROOT_PASSWORD=rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
